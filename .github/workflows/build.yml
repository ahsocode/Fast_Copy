name: Build CopySoft Portable Executables

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  # ──────────────────────────────────────────────────────────────
  # Windows — produces CopySoft.exe  (portable, no installer)
  # ──────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5==5.15.11 pyinstaller==6.11.1

      - name: Build Windows exe
        run: |
          pyinstaller copysoft.spec --clean --noconfirm

      - name: Verify exe exists
        run: |
          dir dist\
          echo "Size:"
          (Get-Item dist\Fast_Copy.exe).length / 1MB
        shell: pwsh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fast_Copy-Windows-portable
          path: dist/Fast_Copy.exe
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # macOS — produces Fast_Copy.app bundle
  # ──────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install PyQt5==5.15.11 pyinstaller==6.11.1

      - name: Build macOS app bundle
        run: |
          pyinstaller copysoft.spec --clean --noconfirm

      - name: Zip app bundle
        run: |
          cd dist && zip -r Fast_Copy-macOS.zip Fast_Copy.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fast_Copy-macOS
          path: dist/Fast_Copy-macOS.zip
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # Create GitHub Release with both binaries (only on version tags)
  # ──────────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Fast_Copy-Windows-portable
          path: release/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: Fast_Copy-macOS
          path: release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/Fast_Copy.exe
            release/Fast_Copy-macOS.zip
          body: |
            ## CopySoft — High-Speed File Copier

            ### Downloads
            - **Windows**: `CopySoft.exe` — portable, no install needed
            - **macOS**: `CopySoft` — portable binary

            ### Performance vs System Default
            | Scenario | Speedup |
            |---|---|
            | Large file (1 GB) | up to 4× faster |
            | Many small files | up to 2× faster |
            | Mixed workload | up to 2× faster |
